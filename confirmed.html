<!DOCTYPE html>                                                                                                                 
  <html lang="en">                                                                                                                                                                                                                        
  <head>                                                                                                                                                                                                                                  
    <meta charset="UTF-8" />                                                                                                                                                                                                              
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />                                                                                                                                                              
    <title>Email Confirmed — Board Session</title>          
    <style>                                                                                                                                                                                                                               
      * { margin: 0; padding: 0; box-sizing: border-box; }  
      body {                                                                                                                                                                                                                              
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #0f0f0f;                                                                                                                                                                                                              
        color: #fff;
        min-height: 100vh;                                                                                                                                                                                                                
        display: flex;                                      
        align-items: center;                                                                                                                                                                                                              
        justify-content: center;                            
        padding: 24px;                                                                                                                                                                                                                    
      }
      .card {                                                                                                                                                                                                                             
        background: #1a1a1a;                                
        border: 1px solid #2a2a2a;
        border-radius: 20px;                                                                                                                                                                                                              
        padding: 48px 40px;
        max-width: 400px;                                                                                                                                                                                                                 
        width: 100%;                                        
        text-align: center;                                                                                                                                                                                                               
      }                                                     
      .icon {
        width: 72px;
        height: 72px;                                                                                                                                                                                                                     
        background: rgba(124, 58, 237, 0.15);
        border-radius: 50%;                                                                                                                                                                                                               
        display: flex;                                      
        align-items: center;                                                                                                                                                                                                              
        justify-content: center;                            
        margin: 0 auto 24px;
        font-size: 32px;
      }                                                                                                                                                                                                                                   
      h1 {
        font-size: 24px;                                                                                                                                                                                                                  
        font-weight: 700;                                   
        margin-bottom: 8px;
      }
      p {                                                                                                                                                                                                                                 
        color: #888;
        font-size: 15px;                                                                                                                                                                                                                  
        line-height: 1.5;                                   
        margin-bottom: 32px;
      }                                                                                                                                                                                                                                   
      .btn {
        display: inline-flex;                                                                                                                                                                                                             
        align-items: center;                                
        gap: 8px;
        background: #7c3aed;
        color: #fff;                                                                                                                                                                                                                      
        font-size: 15px;
        font-weight: 700;                                                                                                                                                                                                                 
        padding: 14px 32px;                                                                                                                                                                                                               
        border-radius: 99px;
        text-decoration: none;                                                                                                                                                                                                            
        transition: opacity 0.15s;                          
      }                                                                                                                                                                                                                                   
      .btn:hover { opacity: 0.85; }
      .footer {                                                                                                                                                                                                                           
        margin-top: 24px;                                   
        font-size: 13px;
        color: #555;                                                                                                                                                                                                                      
      }
    </style>                                                                                                                                                                                                                              
  </head>                                                   
  <body>
    <div class="card">
      <div class="icon">🎲</div>
      <h1>Email confirmed!</h1>                                                                                                                                                                                                           
      <p>Your Board Session account is ready.<br>Open the app to start planning your game nights.</p>
      <a href="boardsession://" class="btn">                                                                                                                                                                                              
        Open Board Session                                  
      </a>                                                                                                                                                                                                                                
      <p class="footer">Don't have the app yet? It's coming soon to the App Store.</p>
    </div>                                                                                                                                                                                                                                
  </body>
  </html>
