<!DOCTYPE html>                                                                                                                 
  <html lang="en">                                                                                                                                                                                                                        
  <head>                                                                                                                                                                                                                                  
    <meta charset="UTF-8" />                                                                                                                                                                                                              
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />                                                                                                                                                              
    <title>Email Confirmed — Board Session</title>                                                                                                                                                                                        
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }                                                                                                                                                                                
      body {                                                                                                                                                                                                                              
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #0f0f0f;                                                                                                                                                                                                              
        color: #fff;                                        
        min-height: 100vh;                                                                                                                                                                                                                
        display: flex;                                                                                                                                                                                                                    
        align-items: center;
        justify-content: center;                                                                                                                                                                                                          
        padding: 24px;                                      
      }
      .card {                                                                                                                                                                                                                             
        background: #1a1a1a;
        border: 1px solid #2a2a2a;                                                                                                                                                                                                        
        border-radius: 20px;                                
        padding: 48px 40px;                                                                                                                                                                                                               
        max-width: 400px;
        width: 100%;                                                                                                                                                                                                                      
        text-align: center;                                 
      }                                                                                                                                                                                                                                   
      .icon {
        width: 72px;                                                                                                                                                                                                                      
        height: 72px;                                       
        background: rgba(124, 58, 237, 0.15);
        border-radius: 50%;                                                                                                                                                                                                               
        display: flex;
        align-items: center;                                                                                                                                                                                                              
        justify-content: center;                            
        margin: 0 auto 24px;
        font-size: 32px;                                                                                                                                                                                                                  
      }
      h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }                                                                                                                                                                       
      p { color: #888; font-size: 15px; line-height: 1.5; margin-bottom: 32px; }                                                                                                                                                          
      .btn {                                                                                                                                                                                                                              
        display: inline-flex;                                                                                                                                                                                                             
        align-items: center;                                                                                                                                                                                                              
        gap: 8px;                                                                                                                                                                                                                         
        background: #7c3aed;
        color: #fff;                                                                                                                                                                                                                      
        font-size: 15px;                                                                                                                                                                                                                  
        font-weight: 700;
        padding: 14px 32px;                                                                                                                                                                                                               
        border-radius: 99px;                                
        text-decoration: none;                                                                                                                                                                                                            
        cursor: pointer;
        border: none;                                                                                                                                                                                                                     
        transition: opacity 0.15s;                          
      }                                                                                                                                                                                                                                   
      .btn:hover { opacity: 0.85; }
      .footer { margin-top: 24px; font-size: 13px; color: #555; }                                                                                                                                                                         
    </style>                                                                                                                                                                                                                              
  </head>
  <body>                                                                                                                                                                                                                                  
    <div class="card">                                      
      <div class="icon">🎲</div>
      <h1>Email confirmed!</h1>
      <p>Your Board Session account is ready.<br>Open the app to start planning your game nights.</p>                                                                                                                                     
      <button class="btn" onclick="openApp()">                                                                                                                                                                                            
        Open Board Session                                                                                                                                                                                                                
      </button>                                                                                                                                                                                                                           
      <p class="footer" id="footer-text">                                                                                                                                                                                                 
        Don't have the app yet? It's coming soon to the App Store and Google Play.                                                                                                                                                        
      </p>                                                                                                                                                                                                                                
    </div>                                                                                                                                                                                                                                
                                                                                                                                                                                                                                          
    <script>                                                
      const ua = navigator.userAgent;
      const isIOS = /iPhone|iPad|iPod/i.test(ua);
      const isAndroid = /Android/i.test(ua);                                                                                                                                                                                              
   
      // Update footer text based on platform                                                                                                                                                                                             
      if (isIOS) {                                          
        document.getElementById('footer-text').textContent =                                                                                                                                                                              
          "Don't have the app? It's coming soon to the App Store.";
      } else if (isAndroid) {                                                                                                                                                                                                             
        document.getElementById('footer-text').textContent =
          "Don't have the app? It's coming soon to Google Play.";                                                                                                                                                                         
      } else {                                              
        document.getElementById('footer-text').textContent = '';                                                                                                                                                                          
      }
                                                                                                                                                                                                                                          
      function openApp() {                                  
        if (!isIOS && !isAndroid) return; // Desktop — do nothing
                                                                                                                                                                                                                                          
        // Try to open the app via deep link
        window.location = 'boardsession://';                                                                                                                                                                                              
                                                            
        // If app isn't installed, page stays visible — redirect to store after 1.5s                                                                                                                                                      
        const storeTimer = setTimeout(() => {
          if (isIOS) {                                                                                                                                                                                                                    
            // TODO: replace with real App Store ID when published
            window.location = 'https://apps.apple.com/app/id6762250356';                                                                                                                                                                   
          } else if (isAndroid) {                           
            window.location = 'https://play.google.com/store/apps/details?id=app.boardsession';                                                                                                                                           
          }                                                                                                                                                                                                                               
        }, 1500);
                                                                                                                                                                                                                                          
        // If the app opened, the page goes hidden — cancel the store redirect                                                                                                                                                            
        document.addEventListener('visibilitychange', () => {
          if (document.hidden) clearTimeout(storeTimer);                                                                                                                                                                                  
        });                                                 
      }                                                                                                                                                                                                                                   
    </script>                                               
  </body>
  </html>
